<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinted AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #fcfcfc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1a1a1a;
        }
        .glass-effect {
            background: #ffffff;
            border: 1px solid #e5e7eb;
        }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s;
        }
        .color-dot:hover {
            transform: scale(1.1);
        }
        .color-dot.active {
            border: 2px solid #000;
        }
        #canvas-buffer {
            display: none;
        }
        /* Fixed Menu Positioning */
        #sideMenu {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 240px;
            background: white;
            border-right: 1px solid #e5e7eb;
            z-index: 100;
            transition: transform 0.3s ease-in-out;
            box-shadow: 10px 0 15px -3px rgba(0, 0, 0, 0.1);
        }
        .menu-hidden {
            transform: translateX(-100%);
        }
        .ai-badge {
            background: linear-gradient(90deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 1px solid #bae6fd;
        }
        /* Mobile adjustment for the toggle button */
        #menuToggle {
            display: none; /* Hidden by default, shown via JS */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 md:p-12">

    <div class="max-w-xl w-full">
        <header class="text-center mb-12">
            <h1 class="text-2xl font-light tracking-tight text-slate-900 mb-2 uppercase">Vinted AI Assistant</h1>
            <p class="text-sm text-slate-400">Professionelle Artikelbeschreibungen</p>
        </header>

        <div class="glass-effect rounded-lg p-8 shadow-sm space-y-8 relative overflow-hidden min-h-[400px]">
            
            <!-- Sandwich Menu Button -->
            <button id="menuToggle" class="absolute top-4 left-4 z-50 p-3 bg-white shadow-md rounded-md border border-slate-200 hover:bg-slate-50 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>

            <!-- Side Menu -->
            <div id="sideMenu" class="menu-hidden flex flex-col p-6">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-[10px] uppercase tracking-widest font-bold">Einstellungen</span>
                    <button id="closeMenu" class="text-slate-400 p-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="space-y-6 flex-1">
                    <div class="space-y-3">
                        <span class="text-[9px] uppercase tracking-widest text-slate-400 font-bold">Bildbearbeitung</span>
                        <button id="removeBgBtn" class="w-full text-[9px] uppercase tracking-widest bg-black text-white py-3 rounded-sm hover:bg-slate-800 transition-all">
                            Hintergrund entfernen
                        </button>

                        <div id="colorPicker" class="hidden space-y-2">
                            <span class="text-[9px] text-slate-400 uppercase">Farbe wählen:</span>
                            <div class="grid grid-cols-4 gap-2">
                                <div class="color-dot active" style="background: white" data-color="white"></div>
                                <div class="color-dot" style="background: #f3f4f6" data-color="#f3f4f6"></div>
                                <div class="color-dot" style="background: #e5e7eb" data-color="#e5e7eb"></div>
                                <div class="color-dot" style="background: #fafaf9" data-color="#fafaf9"></div>
                            </div>
                        </div>
                    </div>

                    <div class="pt-6 border-t border-slate-100 space-y-3">
                        <span class="text-[9px] uppercase tracking-widest text-slate-400 font-bold">KI Analyse</span>
                        <button id="priceEstimateBtn" class="w-full text-[9px] uppercase tracking-widest ai-badge py-3 rounded-sm hover:bg-sky-100 transition-all">
                            Preis schätzen
                        </button>
                        <button id="hashtagBtn" class="w-full text-[9px] uppercase tracking-widest ai-badge py-3 rounded-sm hover:bg-sky-100 transition-all">
                            Hashtags erstellen
                        </button>
                    </div>
                </div>

                <button id="downloadBtn" class="text-[9px] uppercase tracking-widest border border-slate-200 py-3 rounded-sm hover:bg-slate-50 transition-all hidden mt-auto">
                    Bild speichern
                </button>
            </div>

            <!-- Image Area -->
            <div id="dropZone" class="border border-dashed border-slate-200 rounded-md p-4 text-center hover:bg-slate-50 transition-all cursor-pointer relative min-h-[300px] flex items-center justify-center">
                <input type="file" id="fileInput" class="hidden" accept="image/*">
                
                <div id="previewContainer" class="hidden flex flex-col items-center w-full">
                    <div id="imageWrapper" class="relative max-w-full">
                        <img id="imagePreview" src="#" alt="Vorschau" class="max-h-80 rounded-sm transition-all shadow-sm mx-auto">
                        <div id="editLoader" class="absolute inset-0 bg-white/60 flex items-center justify-center hidden backdrop-blur-[2px]">
                            <div class="loader"></div>
                        </div>
                    </div>
                    <button id="removeImg" class="mt-4 text-[9px] uppercase tracking-widest text-slate-300 hover:text-red-400 transition-colors">Bild entfernen</button>
                </div>

                <div id="uploadPrompt" class="py-12">
                    <p class="text-[10px] uppercase tracking-[0.2em] text-slate-400 font-bold">Bild auswählen oder ablegen</p>
                </div>
            </div>

            <!-- Inputs -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-2 font-bold">Marke</label>
                    <input type="text" id="brandInput" placeholder="z.B. Maison Margiela" class="w-full px-0 py-2 bg-transparent border-b border-slate-200 focus:border-black outline-none text-sm transition-all">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest text-slate-400 mb-2 font-bold">Größe</label>
                    <input type="text" id="sizeInput" placeholder="z.B. 38 / M" class="w-full px-0 py-2 bg-transparent border-b border-slate-200 focus:border-black outline-none text-sm transition-all">
                </div>
            </div>

            <button id="generateBtn" class="w-full bg-black text-white text-[10px] uppercase tracking-[0.3em] py-5 rounded-sm hover:bg-slate-900 transition-all active:scale-[0.98] flex justify-center items-center gap-4">
                <span>Text generieren</span>
                <div id="btnLoader" class="loader hidden" style="border-top-color: #fff;"></div>
            </button>
        </div>

        <!-- AI Insights -->
        <div id="insightSection" class="mt-6 hidden grid grid-cols-2 gap-4">
            <div class="glass-effect p-4 rounded-md shadow-sm border-l-2 border-sky-400">
                <span class="text-[9px] uppercase tracking-widest text-slate-400 block mb-1">Preis-Trend</span>
                <span id="priceValue" class="text-sm font-medium">-- €</span>
            </div>
            <div class="glass-effect p-4 rounded-md shadow-sm border-l-2 border-sky-400">
                <span class="text-[9px] uppercase tracking-widest text-slate-400 block mb-1">Hashtags</span>
                <span id="hashtagValue" class="text-[10px] text-slate-500 line-clamp-2 italic">...</span>
            </div>
        </div>

        <!-- Result -->
        <div id="resultSection" class="mt-12 hidden">
            <h2 class="text-[10px] uppercase tracking-[0.2em] text-slate-400 mb-4 font-bold">Beschreibung</h2>
            <div id="descriptionText" class="glass-effect p-8 rounded-md text-sm text-slate-600 whitespace-pre-wrap leading-relaxed shadow-sm border-t border-black"></div>
            <button id="copyBtn" class="mt-6 text-[9px] uppercase tracking-widest text-slate-400 hover:text-black transition-colors border-b border-transparent hover:border-black pb-1">
                Kopieren
            </button>
        </div>
        
        <div id="errorBox" class="mt-6 p-4 text-[10px] uppercase tracking-widest bg-red-50 text-red-500 rounded-sm hidden text-center border border-red-100"></div>
    </div>

    <canvas id="canvas-buffer"></canvas>

    <script>
        const apiKey = ""; 
        
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const menuToggle = document.getElementById('menuToggle');
        const sideMenu = document.getElementById('sideMenu');
        const closeMenu = document.getElementById('closeMenu');
        const removeImg = document.getElementById('removeImg');
        const generateBtn = document.getElementById('generateBtn');
        const btnLoader = document.getElementById('btnLoader');
        const editLoader = document.getElementById('editLoader');
        const resultSection = document.getElementById('resultSection');
        const insightSection = document.getElementById('insightSection');
        const descriptionText = document.getElementById('descriptionText');
        const errorBox = document.getElementById('errorBox');
        const removeBgBtn = document.getElementById('removeBgBtn');
        const colorPicker = document.getElementById('colorPicker');
        const downloadBtn = document.getElementById('downloadBtn');
        const priceEstimateBtn = document.getElementById('priceEstimateBtn');
        const hashtagBtn = document.getElementById('hashtagBtn');

        let originalBase64 = "";
        let currentBackground = "white";

        dropZone.onclick = (e) => {
            if (e.target.closest('#previewContainer') || e.target.closest('#sideMenu') || e.target.closest('#menuToggle')) return;
            fileInput.click();
        };
        
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        };

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                originalBase64 = e.target.result.split(',')[1];
                imagePreview.src = e.target.result;
                uploadPrompt.classList.add('hidden');
                previewContainer.classList.remove('hidden');
                menuToggle.style.display = 'block'; // Make sandwich menu visible
                insightSection.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        menuToggle.onclick = (e) => {
            e.stopPropagation();
            sideMenu.classList.toggle('menu-hidden');
        };

        closeMenu.onclick = (e) => {
            e.stopPropagation();
            sideMenu.classList.add('menu-hidden');
        };

        removeImg.onclick = (e) => {
            e.stopPropagation();
            originalBase64 = "";
            fileInput.value = "";
            uploadPrompt.classList.remove('hidden');
            previewContainer.classList.add('hidden');
            menuToggle.style.display = 'none'; // Hide sandwich menu
            sideMenu.classList.add('menu-hidden');
            insightSection.classList.add('hidden');
            imagePreview.style.backgroundColor = 'transparent';
        };

        async function callGemini(payload, model = "gemini-2.5-flash-preview-09-2025") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('API Error');
                    return await response.json();
                } catch (err) {
                    if (i === 4) throw err;
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
        }

        removeBgBtn.onclick = async (e) => {
            e.stopPropagation();
            editLoader.classList.remove('hidden');
            sideMenu.classList.add('menu-hidden');
            try {
                const payload = {
                    contents: [{
                        parts: [
                            { text: "Hintergrund entfernen und transparent machen. NUR das Bild zurückgeben." },
                            { inlineData: { mimeType: "image/png", data: originalBase64 } }
                        ]
                    }],
                    generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                };
                const result = await callGemini(payload, "gemini-2.5-flash-image-preview");
                const base64 = result.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                if (base64) {
                    imagePreview.src = `data:image/png;base64,${base64}`;
                    removeBgBtn.classList.add('hidden');
                    colorPicker.classList.remove('hidden');
                    downloadBtn.classList.remove('hidden');
                }
            } catch (err) { showError("Fehler beim Bearbeiten."); }
            finally { editLoader.classList.add('hidden'); }
        };

        priceEstimateBtn.onclick = async (e) => {
            e.stopPropagation();
            sideMenu.classList.add('menu-hidden');
            insightSection.classList.remove('hidden');
            document.getElementById('priceValue').innerText = "Analyse...";
            
            const brand = document.getElementById('brandInput').value;
            const payload = {
                contents: [{
                    parts: [
                        { text: `Schätze den Vinted-Preis für diesen Artikel. Marke: ${brand}. Gib NUR die Preisspanne zurück (z.B. 10 - 15 €). Kein Text dazu.` },
                        { inlineData: { mimeType: "image/png", data: originalBase64 } }
                    ]
                }],
                tools: [{ "google_search": {} }]
            };

            try {
                const result = await callGemini(payload);
                document.getElementById('priceValue').innerText = result.candidates?.[0]?.content?.parts?.[0]?.text.trim() || "-- €";
            } catch (err) { document.getElementById('priceValue').innerText = "Fehler"; }
        };

        hashtagBtn.onclick = async (e) => {
            e.stopPropagation();
            sideMenu.classList.add('menu-hidden');
            insightSection.classList.remove('hidden');
            document.getElementById('hashtagValue').innerText = "Generiere...";

            const brand = document.getElementById('brandInput').value;
            const payload = {
                contents: [{
                    parts: [
                        { text: `Erstelle 10 Vinted Hashtags. Marke: ${brand}. Nur Hashtags mit Leerzeichen, keine Emojis.` },
                        { inlineData: { mimeType: "image/png", data: originalBase64 } }
                    ]
                }]
            };

            try {
                const result = await callGemini(payload);
                document.getElementById('hashtagValue').innerText = result.candidates?.[0]?.content?.parts?.[0]?.text.trim() || "#fashion";
            } catch (err) { document.getElementById('hashtagValue').innerText = "Fehler"; }
        };

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.onclick = (e) => {
                e.stopPropagation();
                currentBackground = dot.getAttribute('data-color');
                imagePreview.style.backgroundColor = currentBackground;
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
                dot.classList.add('active');
            };
        });

        downloadBtn.onclick = (e) => {
            e.stopPropagation();
            const canvas = document.getElementById('canvas-buffer');
            const ctx = canvas.getContext('2d');
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.fillStyle = currentBackground;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
                const link = document.createElement('a');
                link.download = 'vinted-edit.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            };
            img.src = imagePreview.src;
        };

        generateBtn.onclick = async () => {
            if (!originalBase64) return showError("Bild fehlt.");
            errorBox.classList.add('hidden');
            generateBtn.disabled = true;
            btnLoader.classList.remove('hidden');

            const brand = document.getElementById('brandInput').value;
            const size = document.getElementById('sizeInput').value;
            
            const payload = {
                contents: [{
                    parts: [
                        { text: `Erstelle eine kurze Vinted-Beschreibung auf Deutsch. Marke: ${brand}, Größe: ${size}. Benutze NUR Stichpunkte. Absolut KEINE Emojis.` },
                        { inlineData: { mimeType: "image/png", data: originalBase64 } }
                    ]
                }],
                tools: [{ "google_search": {} }]
            };

            try {
                const result = await callGemini(payload);
                descriptionText.innerText = result.candidates?.[0]?.content?.parts?.[0]?.text || "Fehler.";
                resultSection.classList.remove('hidden');
                resultSection.scrollIntoView({ behavior: 'smooth' });
            } catch (err) { showError("Verbindung fehlgeschlagen."); }
            finally {
                generateBtn.disabled = false;
                btnLoader.classList.add('hidden');
            }
        };

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }

        document.getElementById('copyBtn').onclick = () => {
            const text = descriptionText.innerText;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            document.getElementById('copyBtn').innerText = "Kopiert";
            setTimeout(() => document.getElementById('copyBtn').innerText = "Kopieren", 2000);
        };
    </script>
</body>
</html>
