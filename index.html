<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinted Beschreibung Generator</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fff;
    color: #000;
    margin: 0;
    padding: 40px 20px;
    font-weight: 300;
}

.container {
    max-width: 600px;
    margin: 0 auto;
}

h1 {
    font-weight: 300;
    font-size: 26px;
    margin-bottom: 40px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 18px;
    border: 1px solid #000;
    background: #fff;
    color: #000;
    font-weight: 300;
}

input[type="file"] {
    border: none;
    padding-left: 0;
}

button {
    width: 100%;
    padding: 12px;
    background: #000;
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 300;
}

button:hover {
    opacity: 0.85;
}

.preview {
    margin-top: 10px;
    margin-bottom: 20px;
}

.preview img {
    max-width: 100%;
    height: auto;
    border: 1px solid #000;
}

.output {
    margin-top: 40px;
    border-top: 1px solid #000;
    padding-top: 20px;
    white-space: pre-line;
}

.copy-btn {
    margin-top: 20px;
    background: #fff;
    color: #000;
    border: 1px solid #000;
}
</style>
</head>

<body>

<div class="container">
    <h1>Vinted Artikel Generator</h1>

    <input type="text" id="brand" placeholder="Marke (z.B. Nike)">
    <input type="text" id="size" placeholder="Größe (z.B. M)">
    
    <select id="condition">
        <option value="">Zustand wählen</option>
        <option>Neu mit Etikett</option>
        <option>Sehr gut</option>
        <option>Gut</option>
        <option>Getragen</option>
    </select>

    <select id="category">
        <option value="">Kategorie wählen</option>
        <option>Hoodie</option>
        <option>T-Shirt</option>
        <option>Jacke</option>
        <option>Jeans</option>
        <option>Kleid</option>
        <option>Pullover</option>
        <option>Bluse</option>
    </select>

    <select id="color">
        <option value="">Farbe wählen</option>
        <option>Schwarz</option>
        <option>Weiß</option>
        <option>Grau</option>
        <option>Beige</option>
        <option>Blau</option>
        <option>Rot</option>
        <option>Grün</option>
    </select>

    <select id="style">
        <option value="">Stil wählen</option>
        <option>Oversized</option>
        <option>Vintage</option>
        <option>Streetwear</option>
        <option>Minimalistisch</option>
        <option>Elegant</option>
        <option>Sportlich</option>
        <option>Y2K</option>
    </select>

    <input type="file" id="imageInput" accept="image/*">
    <div class="preview" id="preview"></div>

    <button onclick="generateDescription()">Beschreibung generieren</button>

    <div class="output" id="output"></div>

    <button class="copy-btn" onclick="copyText()">Text kopieren</button>
</div>

<script>

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", function() {
    preview.innerHTML = "";
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.createElement("img");
            img.src = e.target.result;
            preview.appendChild(img);
        };
        reader.readAsDataURL(file);
    }
});

function generateDescription() {

    const brand = document.getElementById("brand").value;
    const size = document.getElementById("size").value;
    const condition = document.getElementById("condition").value;
    const category = document.getElementById("category").value;
    const color = document.getElementById("color").value;
    const style = document.getElementById("style").value;

    let text = "";

    if (brand) text += "• Marke: " + brand + "\n";
    if (category) text += "• Kategorie: " + category + "\n";
    if (size) text += "• Größe: " + size + "\n";
    if (color) text += "• Farbe: " + color + "\n";
    if (style) text += "• Stil: " + style + "\n";
    if (condition) text += "• Zustand: " + condition + "\n";

    text += "\n";

    // Verkaufsoptimierter Zusatztext
    if (style === "Oversized") {
        text += "• Lockerer, entspannter Fit\n";
    }

    if (style === "Vintage") {
        text += "• Angesagter Retro Look\n";
    }

    if (style === "Streetwear") {
        text += "• Perfekt kombinierbar für moderne Outfits\n";
    }

    if (style === "Elegant") {
        text += "• Zeitloser & stilvoller Schnitt\n";
    }

    text += "• Angenehm zu tragen\n";
    text += "• Vielseitig kombinierbar\n";
    text += "• Nichtraucherhaushalt\n";
    text += "• Schneller Versand möglich\n";
    text += "• Privatverkauf – keine Rücknahme\n";

    document.getElementById("output").innerText = text;
}

function copyText() {
    const text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
    alert("Text kopiert!");
}

</script>

</body>
</html>
